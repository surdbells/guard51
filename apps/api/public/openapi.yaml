components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string
        errors:
          type: array
          items:
            type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        totp_code:
          type: string
          description: 2FA TOTP code (if 2FA enabled)

    RegisterRequest:
      type: object
      required: [company_name, email, password, plan_id]
      properties:
        company_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        plan_id:
          type: string
          format: uuid

    Site:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        geofence_radius:
          type: integer
        status:
          type: string
          enum: [active, inactive, suspended]

    Guard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        employee_number:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended, terminated]

    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [reported, investigating, escalated, resolved, closed]

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_number:
          type: string
        total_amount:
          type: number
        currency:
          type: string
          default: NGN
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [shift_assigned, shift_change, clock_reminder, incident, panic, dispatch, report, message, invoice, system]
        title:
          type: string
        body:
          type: string
        channel:
          type: string
          enum: [push, sms, email, in_app]
        is_read:
          type: boolean

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        last_page:
          type: integer