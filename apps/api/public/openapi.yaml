    description: Post site CRUD and geofence configuration
  - name: Guards
    description: Guard profiles, skills, documents
  - name: Clients
    description: Client company CRUD and contacts
  - name: Dashboard
    description: Company dashboard stats and metrics
  - name: Attendance
    description: Attendance records and reconciliation
  - name: Passdowns
    description: Guard passdown logs between shifts
  - name: GPS Tracking
    description: Live guard locations and geofence alerts
  - name: Site Tours
    description: Tour checkpoints, sessions, QR/NFC scans
  - name: Panic Alerts
    description: Emergency panic button alerts
  - name: Reports
    description: Daily activity reports, custom templates
  - name: Incidents
    description: Incident reporting and escalation
  - name: Dispatch
    description: Dispatch calls and guard assignments
  - name: Tasks
    description: Task assignment and tracking
  - name: Invoices
    description: Client invoicing with NGN/VAT
  - name: Payroll
    description: Guard payroll with Nigeria PAYE
  - name: Client Portal
    description: Client-facing data access
  - name: Chat
    description: Real-time messaging and conversations
  - name: Notifications
    description: In-app, push, SMS, email notifications
  - name: Security
    description: 2FA setup/verify, audit logging
  - name: Guard Licenses
    description: Certification tracking and expiry alerts
  - name: Analytics
    description: KPIs and guard performance index
  - name: Visitors
    description: Visitor check-in/out management
  - name: Parking
    description: Parking area management and incidents
  - name: Tenants
    description: Tenant CRUD and management
  - name: Scheduling
    description: Shift templates, shifts, swap requests
  - name: Time Clock
    description: Clock in/out, GPS+selfie verification
  - name: Vehicle Patrol
    description: Patrol vehicles, routes, hit tracking

